<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 Ucapan Ulang Tahun</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .wishes-header {
            text-align: center;
            padding: 2rem 0;
        }

        .wishes-header .big-emoji {
            font-size: 5rem;
            animation: bounceIn 0.8s ease;
            display: block;
            margin-bottom: 1rem;
        }

        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1rem 0 3rem;
        }

        .wish-card {
            position: relative;
            perspective: 1000px;
            min-height: 250px;
            cursor: pointer;
        }

        .wish-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 250px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .wish-card.flipped .wish-card-inner {
            transform: rotateY(180deg);
        }

        .wish-front,
        .wish-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: 250px;
            backface-visibility: hidden;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .wish-front {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: var(--border-glass);
        }

        .wish-front .wish-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .wish-front h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: var(--pink-300);
            margin-bottom: 0.5rem;
        }

        .wish-front .tap-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .wish-back {
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid rgba(244, 114, 182, 0.2);
            transform: rotateY(180deg);
        }

        .wish-back p {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .wish-back .wish-author {
            margin-top: 1rem;
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: var(--gold-500);
        }

        .countdown-section {
            text-align: center;
            padding: 3rem 0;
        }

        .countdown-card {
            display: inline-flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 2rem;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--pink-400), var(--gold-300));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reaction-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 0;
            flex-wrap: wrap;
        }

        .reaction-btn {
            font-size: 2rem;
            padding: 0.8rem 1.2rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition-fast);
            background: var(--bg-glass);
            border: var(--border-glass);
            position: relative;
        }

        .reaction-btn:hover {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .reaction-btn.active {
            animation: heartBeat 1s ease;
            background: rgba(244, 114, 182, 0.2);
            border-color: var(--pink-400);
        }

        .reaction-btn .count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--pink-500);
            color: white;
            font-size: 0.7rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        @media (max-width: 600px) {
            .wishes-grid {
                grid-template-columns: 1fr;
            }

            .countdown-number {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="container">
            <div class="wishes-header">
                <span class="big-emoji">💌</span>
                <h1 class="section-title">Ucapan Ulang Tahun</h1>
                <p class="section-subtitle">Klik kartu untuk membaca pesan spesial untukmu 💖</p>
            </div>

            <!-- Reaction Bar -->
            <div class="reaction-bar" id="reactionBar"></div>

            <!-- Wishes Grid -->
            <div class="wishes-grid" id="wishesGrid"></div>



        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="wishes.js"></script>
</body>

</html>
